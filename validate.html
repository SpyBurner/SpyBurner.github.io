<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking...</title>
    <script>
        function onloadBody(){
            url = new URL(window.location);
            username = url.searchParams.get("username");
            password = url.searchParams.get("password");

            if (username.length == 0 || username == null) {back('2'); return;};
            if (password.length == 0 || password == null) {back('3'); return};
            alert(username + " " + password);

            if (sessionStorage.getItem(username) != password) back('1');
            alert(sessionStorage.getItem(username) != password);
            
            go(username);
        }

        function go(username){
            sessionStorage.setItem("loggedin", "1");

            if (username == sessionStorage.getItem("key1")){
                window.location.assign("./gift1.html");
                return;
            }
            if (username == sessionStorage.getItem("key2")){
                window.location.assign("./gift2.html");
                return;
            }
            window.location.assign("./login.html?error=1");
        }

        function back(err){
            window.location.assign("./login.html?&error=" + err);
            return;
        }
    </script>
</head>
<body onload="onloadBody()">
</body>
</html>
